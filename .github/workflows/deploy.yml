name: Deploy JamJam_SW to EC2

on:
  push:
    branches: [ "master" ]  # ← 리포 기본 브랜치에 맞게 'master' 또는 'main'으로 통일하세요.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source (for workflow context only)
        uses: actions/checkout@v4

      - name: SSH to EC2 and deploy Spring Boot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_EC2_KEY }}
          port: 22
          script: |
            set -euo pipefail

            echo "==== 프로젝트 디렉토리 준비 ===="
            if [ ! -d "$HOME/JamJam_SW/.git" ]; then
              git clone https://github.com/joeunjiii/JamJam_SW.git "$HOME/JamJam_SW"
            fi
            cd "$HOME/JamJam_SW"

            echo "==== 브랜치 동기화 (master) ===="
            git fetch --all --prune
            git checkout master
            git reset --hard origin/master

            echo "==== .env 생성 ===="
            cat > .env <<'EOF'
            # ===== Database =====
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}

            # ===== Spring =====
            SPRING_PROFILES_ACTIVE=${{ secrets.SPRING_PROFILES_ACTIVE }}

            # ===== JWT =====
            APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
            APP_JWT_ACCESS_TTL_MS=${{ secrets.APP_JWT_ACCESS_TTL_MS }}

            # ===== Web =====
            APP_WEB_SUCCESS_URL=${{ secrets.APP_WEB_SUCCESS_URL }}
            APP_POST_LOGIN_MOBILE_DEEPLINK=${{ secrets.APP_POST_LOGIN_MOBILE_DEEPLINK }}

            # ===== OAuth =====
            KAKAO_CLIENT_ID=${{ secrets.KAKAO_CLIENT_ID }}
            KAKAO_CLIENT_SECRET=${{ secrets.KAKAO_CLIENT_SECRET }}
            KAKAO_REST_API_KEY=${{ secrets.KAKAO_REST_API_KEY }}
            EXPO_PUBLIC_KAKAO_REDIRECT_URI=${{ secrets.EXPO_PUBLIC_KAKAO_REDIRECT_URI }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            EOF

            echo "==== .env 키 목록 (값 마스킹) ===="
            sed 's/=.*/=***/' .env | sort

            echo "==== 기존 컨테이너 정리 ===="
            docker rm -f jamjam-sw 2>/dev/null || true

            echo "==== 도커 캐시 정리 (선택) ===="
            docker system prune -af || true
            docker builder prune -af || true

            echo "==== Docker 이미지 빌드 (멀티스테이지) ===="
            # Dockerfile이 리포 루트에 있다는 가정입니다. 위치가 다르면 -f 경로 지정
            GIT_SHA=$(git rev-parse --short HEAD)
            docker build --no-cache -t jamjam-sw:latest -t jamjam-sw:${GIT_SHA} .

            echo "==== 컨테이너 실행 ===="
            docker run -d \
              --name jamjam-sw \
              --restart always \
              --env-file .env \
              -p 8082:8082 \
              jamjam-sw:latest

            echo "==== 기동 대기 (최대 60초) ===="
            for i in $(seq 1 60); do
              if docker logs jamjam-sw 2>&1 | grep -q "Started"; then
                break
              fi
              sleep 1
            done

            echo "==== 컨테이너 내부 JAR에 컨트롤러 포함 여부 확인 ===="
            docker exec jamjam-sw sh -lc 'jar tf /app.jar | grep -E "BOOT-INF/classes/.*/controller/.*Controller" | head -n 20' || true

            echo "==== 간단 헬스체크 ===="
            # 액추에이터가 켜져 있으면 health, 아니면 공개 GET 하나를 확인
            curl -s -I http://127.0.0.1:8082/actuator/health || true
            curl -s -I http://127.0.0.1:8082/api/dm/threads || true

            echo "==== 최근 로그 ===="
            docker logs --tail 200 jamjam-sw
